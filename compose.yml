services:
  db:
    image: "postgres:14.21-alpine3.23"
    restart: always
    environment: 
      POSTGRES_DB: db_lab1
      POSTGRES_USER: user_lab1
      POSTGRES_PASSWORD: password_lab1
    volumes:
      - ./postgres_data:/var/lib/postgresql/data

  api: 
    build: ./java-app
    depends_on:
      - db
    ports: 
      - "8080:8080"
    environment:
      DB_HOST: db # isto deveria estar numa envionmental variable eu sei, apenas está assim para melhor manuseio (só para nao estar a alterar tudo)
      DB_PORT: 5432
      DB_NAME: db_lab1
      DB_USER: user_lab1
      DB_PASSWORD: password_lab1
    stdin_open: true
    tty: true

  frontend:
    build: ./frontend
    restart: on-failure
    ports:
      - "8000:3000"
    environment:
      REACT_APP_API_URL: ${API_URL} 
      WDS_SOCKET_PORT: 8000 # host port
    volumes: 
      - ./frontend/app:/app